# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  schedule:
    - cron: "45 5 * * 0"

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Skip heavy Codacy scan on pull requests
        if: github.event_name == 'pull_request'
        run: echo "Skipping full Codacy security scan on pull_request to keep PR checks fast."

      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      # Execute Codacy Analysis CLI and generate a SARIF output with the security issues identified during the analysis
      - name: Run Codacy Analysis CLI
        if: github.event_name != 'pull_request'
        uses: codacy/codacy-analysis-cli-action@d43360362776a6789b47b99ae8973510854e2d3d
        with:
          verbose: true
          output: results.sarif
          format: sarif
          # The SARIF output file is generated during analysis and would otherwise
          # be detected as an uncommitted file by Codacy CLI.
          skip-uncommitted-files-check: true
          # Restrict to issue scanners to avoid metrics-only SARIF edge cases.
          tool: issues
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647

      - name: Check SARIF upload compatibility
        if: github.event_name != 'pull_request'
        id: sarif_check
        run: |
          python3 - <<'PY'
          import json
          import os

          with open("results.sarif", "r", encoding="utf-8") as f:
              run_count = len(json.load(f).get("runs", []))

          print(f"Detected {run_count} SARIF run(s).")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"run_count={run_count}\n")
          PY

      # Upload the SARIF file generated in the previous step
      - name: Upload SARIF results file
        if: github.event_name != 'pull_request' && steps.sarif_check.outputs.run_count == '1'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Skip SARIF upload notice
        if: github.event_name != 'pull_request' && steps.sarif_check.outputs.run_count != '1'
        run: echo "Skipping SARIF upload because CodeQL upload only supports a single SARIF run per category."
