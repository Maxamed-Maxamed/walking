name: Claude PR Review
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@73367208d0bc0c529b8b3fb223cbd4a8f63586e4 # beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the DogWalker Expo React Native app.
            Focus on:
            - TypeScript strict mode violations
            - React Native / Expo SDK 55 best practices
            - NativeWind v4 className usage (no StyleSheet.create unless necessary)
            - Supabase RLS and auth security concerns
            - TanStack Query patterns (query keys, staleTime, invalidation)
            - async onPress handlers (must use void wrapper)
            - Missing try/catch/finally on Supabase calls
            Post inline review comments on specific lines where issues are found.
